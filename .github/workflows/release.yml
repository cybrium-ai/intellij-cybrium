# Build + publish Cybrium IntelliJ plugin to JetBrains Marketplace.
#
# Trigger: git tag v0.1.0 && git push origin v0.1.0
#
# Required secret: PUBLISH_TOKEN (JetBrains Marketplace permanent token)

name: Release to JetBrains Marketplace

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate Gradle wrapper
        run: gradle wrapper

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Verify plugin
        run: ./gradlew verifyPlugin

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: intellij-cybrium-plugin
          path: build/distributions/*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
          generate_release_notes: true
          body: |
            ## Install
            1. Download the `.zip` file below
            2. IntelliJ: Settings > Plugins > Gear icon > Install Plugin from Disk
            3. Select the downloaded `.zip` file
            4. Restart IDE

            Requires cyscan: `brew tap cybrium-ai/cli && brew install cyscan`

      - name: Publish to JetBrains Marketplace
        continue-on-error: true
        run: ./gradlew publishPlugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
